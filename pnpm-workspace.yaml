# ---------------------------------------------------------------
# pnpm 工作区声明
# 告诉 pnpm 哪些目录参与 monorepo，实现跨包引用和统一依赖管理
# apps/* — 三个应用（sdk / gateway / console）
# packages/* — 共享内部包（shared-types / ui-components）
# ---------------------------------------------------------------
packages:
  - 'apps/*'
  - 'packages/*'
