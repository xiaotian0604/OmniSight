# ---------------------------------------------------------------
# OmniSight 本地开发依赖
# 启动方式：docker-compose up -d
#
# 包含两个服务：
# 1. PostgreSQL + TimescaleDB — 时序事件存储（自动按时间分区）
# 2. Redis 7 — Bull Queue 消息队列 + 布隆过滤器去重 + 会话缓存
#
# init.sql 会在 PostgreSQL 首次启动时自动执行，创建所有表和索引
# ---------------------------------------------------------------
services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: omnisight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    # 健康检查：确保 PG 就绪后 Gateway 才能连接
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
